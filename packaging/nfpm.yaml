name: fuse-promise
arch: ${FUSE_PROMISE_ARCH}
platform: linux
version: ${FUSE_PROMISE_VERSION}
release: "1"
version_schema: semver
section: utils
priority: optional
maintainer: fuse-promise contributors
description: Linux user-space Promise filesystem runtime built on FUSE.
homepage: https://github.com/fuse-promise/fuse-promise
umask: 0o022

contents:
  - src: ${FUSE_PROMISE_STAGE}/usr/include/fuse-promise/fuse-promise.h
    dst: /usr/include/fuse-promise/fuse-promise.h
    expand: true
    file_info:
      mode: 0644

  - src: ${FUSE_PROMISE_STAGE}/usr/lib/libfusepromise.so.${FUSE_PROMISE_VERSION}
    dst: /usr/lib/libfusepromise.so.${FUSE_PROMISE_VERSION}
    expand: true
    file_info:
      mode: 0755

  - src: libfusepromise.so.${FUSE_PROMISE_VERSION}
    dst: /usr/lib/libfusepromise.so.${FUSE_PROMISE_SONAME_MAJOR}
    type: symlink
    expand: true

  - src: libfusepromise.so.${FUSE_PROMISE_SONAME_MAJOR}
    dst: /usr/lib/libfusepromise.so
    type: symlink
    expand: true

  - src: ${FUSE_PROMISE_STAGE}/usr/lib/pkgconfig/fuse-promise.pc
    dst: /usr/lib/pkgconfig/fuse-promise.pc
    expand: true
    file_info:
      mode: 0644

  - src: ${FUSE_PROMISE_STAGE}/usr/bin/fuse-promised
    dst: /usr/bin/fuse-promised
    expand: true
    file_info:
      mode: 0755

  - src: ${FUSE_PROMISE_STAGE}/usr/bin/fpctl
    dst: /usr/bin/fpctl
    expand: true
    file_info:
      mode: 0755

  - src: ${FUSE_PROMISE_STAGE}/usr/lib/systemd/user/fuse-promised.service
    dst: /usr/lib/systemd/user/fuse-promised.service
    expand: true
    file_info:
      mode: 0644

overrides:
  deb:
    depends:
      - fuse3
      - libfuse3-3
  rpm:
    depends:
      - fuse3
      - fuse3-libs
