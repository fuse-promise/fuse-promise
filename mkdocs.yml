site_name: fuse-promise
site_description: Linux user-space Promise filesystem runtime built on FUSE.
site_url: https://fuse-promise.github.io/fuse-promise/
repo_url: https://github.com/fuse-promise/fuse-promise
repo_name: fuse-promise/fuse-promise
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

plugins:
  - search

not_in_nav: |
  /development-style.md
  /implementation-decisions.md
  /language-and-abi.md
  /progress.md
  /project-statement.md
  /requirements.md
  /roadmap.md
  /stable-abi-release.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Overview: index.md
  - Use:
      - Public API: public-api.md
      - Packaging: packaging.md
      - Testing: testing.md
  - Concepts:
      - Architecture: architecture.md
      - Runtime: runtime.md
      - Promise Model: promise-model.md
      - Security: security.md
  - Maintenance: maintenance.md
  - Release Notes:
      - Stable: release-notes-stable.md
      - 1.0.2: release-notes-1.0.2.md
      - 1.0.1: release-notes-1.0.1.md
      - 0.1.0: release-notes-0.1.0.md
