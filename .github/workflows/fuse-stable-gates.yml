name: FUSE Stable Gates

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  RUST_TOOLCHAIN: "1.85"

jobs:
  stable:
    name: Full stable release gates
    runs-on:
      - self-hosted
      - linux
      - fuse

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies on Debian-like runners
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            if command -v sudo >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y build-essential pkg-config libfuse3-dev fuse3
            elif [ "$(id -u)" -eq 0 ]; then
              apt-get update
              apt-get install -y build-essential pkg-config libfuse3-dev fuse3
            else
              echo "::notice::apt-get is available but sudo is not; assuming runner dependencies are preinstalled."
            fi
          fi

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component rustfmt
          rustup default "$RUST_TOOLCHAIN"

      - name: Cache Cargo state
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-rust-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-${{ env.RUST_TOOLCHAIN }}-

      - name: Verify FUSE runner
        run: |
          test -c /dev/fuse
          command -v fusermount3
          pkg-config --exists fuse3

      - name: Run stable release gates
        run: BUILD_PROFILE=release SONAME_MAJOR=1 tests/stable-release-gates.sh
