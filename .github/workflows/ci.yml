name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_TOOLCHAIN: "1.85"

jobs:
  core:
    name: Core gates
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libfuse-dev libfuse3-dev fuse3

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component rustfmt
          rustup default "$RUST_TOOLCHAIN"

      - name: Cache Cargo state
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-rust-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-${{ env.RUST_TOOLCHAIN }}-

      - name: Check formatting
        run: cargo fmt --check --all

      - name: Check workspace
        run: cargo check --workspace --locked

      - name: Check FUSE daemon backends
        run: |
          cargo check -p fuse-promise-daemon --features fuse-mount-fuse --locked
          cargo check -p fuse-promise-daemon --features fuse-mount-fuse3 --locked

      - name: Test workspace
        run: cargo test --workspace --locked

      - name: Check stable ABI
        run: BUILD_PROFILE=release SONAME_MAJOR=1 tests/abi-hardening.sh

      - name: Check install metadata
        run: BUILD_PROFILE=release SONAME_MAJOR=1 tests/install-metadata.sh

      - name: Check control socket security
        run: tests/control-socket-security.sh

      - name: Check materialize security
        run: tests/materialize-security.sh

      - name: Check whitespace
        run: git diff --check
